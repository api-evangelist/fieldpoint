apis:
  - name: Fieldpoint REST API (FPDTS)
    description: >
      The Fieldpoint Data Transfer Service (FPDTS) is Fieldpoint's open REST
      API that enables data exchange between the Fieldpoint FSM platform and
      external enterprise systems. The API supports creating and updating work
      orders, managing technician records, scheduling jobs, syncing inventory
      levels, and exporting billing and timesheet data. It is designed for
      enterprise integrations with ERP, CRM, accounting, and workforce
      management platforms.
